syntax = "proto3";
package actnet;

message ContentMessage {
  oneof body {
    TextMessage    text    = 1;
    ReceiptMessage receipt = 2;
  }
  uint64 timestamp_ms = 15;
}

message TextMessage {
  string body = 1;
}

message ReceiptMessage {
  enum Type { DELIVERY = 0; READ = 1; }
  Type             type       = 1;
  repeated uint64  timestamps = 2;
}
