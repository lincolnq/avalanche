syntax = "proto3";
package actnet;

message TimerChangeMessage {
  uint32 expiry_secs = 1; // seconds; 0 = disable expiry
}

message ContentMessage {
  oneof body {
    TextMessage             text                      = 1;
    ReceiptMessage          receipt                   = 2;
    GroupContext            group_context             = 3;
    SenderKeyDistribution   sender_key_distribution   = 4;
    GroupMessage            group_message             = 5;
    TimerChangeMessage      timer_change              = 6;
    EditMessage             edit                      = 7;
    DeleteMessage           delete                    = 8;
    ReactionMessage         reaction                  = 9;
    SyncSent                sync_sent                 = 10;
    SyncRead                sync_read                 = 11;
  }
  // Reserved for upcoming body variants (typing, group control, call
  // signaling, etc.). Field numbers inside a `oneof` share the parent
  // message's number space, so reservations live here at the message
  // level. Pick a number from this block when adding a new variant;
  // never reuse 1-11 even if removed.
  reserved 12 to 14;
  uint64 timestamp_ms = 15;
  // Sender's profile key (32 bytes, AES-256-GCM). When present, recipients
  // can fetch and decrypt the sender's encrypted profile blob. Attached to
  // any ContentMessage variant when the sender has chosen to share their
  // profile with the recipient. Empty bytes (length 0) means "not sharing
  // this time" — protobuf has no native optional-bytes distinction.
  bytes profile_key = 17;
  // Disappearing-messages timer for THIS message, in seconds (`0` = no
  // expiry). Stamped by the sender from the conversation's current timer at
  // send time (docs/03 §5). The recipient starts the countdown on read and
  // hard-deletes locally; carrying it per-message (rather than reading the
  // recipient's synced timer) keeps expiry correct across timer changes and
  // the group state-vs-message channel split. Only message-creating bodies
  // (text) set it; control/derivative bodies leave it 0.
  uint32 expire_timer_secs = 18;
  // Reserved for future cross-cutting envelope metadata (group_id,
  // conversation_id, etc.).
  reserved 19 to 30;
}

message TextMessage {
  string body = 1;
  // Future: attachments, mentions, reply_to, formatting.
  reserved 2 to 10;
}

// In-place edit of a prior message (docs/36-message-editing-deletion.md).
// Targets the sender's own earlier message by its `sent_at`; the operation's
// cryptographically-authenticated sender must equal the target's author, so
// no author field is needed (an edit can only touch your own message).
// Last-writer-wins by the edit's own `timestamp_ms` (the outer envelope).
message EditMessage {
  // `sent_at` (ContentMessage.timestamp_ms) of the message being edited.
  uint64      target_sent_at = 1;
  // Full replacement body. `replacement.body` supersedes the original text.
  TextMessage replacement    = 2;
  reserved 3 to 10;
}

// Retraction of a prior message (docs/36-message-editing-deletion.md). Two
// scopes: FOR_EVERYONE tombstones the message for all recipients (authorship-
// gated — sender must equal `target_author`); FOR_ME removes it from the
// sender's own devices only (any message, no authorship check). Delete is the
// absorbing state in the LWW lattice — a tombstone wins over any edit.
message DeleteMessage {
  enum Scope {
    FOR_EVERYONE = 0;
    FOR_ME       = 1;
  }
  // `sent_at` of the target message.
  uint64 target_sent_at = 1;
  // DID of the target message's author. For FOR_EVERYONE this must equal the
  // authenticated sender; for FOR_ME it identifies which message (needed
  // because (sent_at) alone isn't unique across authors in a group).
  string target_author  = 2;
  Scope  scope          = 3;
  reserved 4 to 10;
}

// A reaction to a prior message (docs/33-reactions.md). One reaction per
// person per message: sending a new `emoji` replaces the reactor's previous
// one; `remove = true` clears it. Keyed on (target_author, target_sent_at,
// reactor) so it converges regardless of arrival order.
message ReactionMessage {
  // Identity of the target message: (author, sent_at).
  uint64 target_sent_at = 1;
  string target_author  = 2;
  // The reaction emoji. Ignored when `remove` is true.
  string emoji          = 3;
  // True = remove this reactor's reaction from the target.
  bool   remove         = 4;
  reserved 5 to 10;
}

// Invite-flow group bootstrap DM (docs/03-groups.md §3.10). The admin's
// client sends this as the per-recipient envelope after submitting
// `invite_members`. The recipient stores `group_master_key` locally,
// derives the group identifier client-side, and then fetches the group
// state to see themselves in the pending list.
message GroupContext {
  // 32-byte zkgroup master key. Bootstraps every other group-derived key
  // (group_id, encryption key, did-enc key pair).
  bytes group_master_key = 1;
  // Server URL hosting this group. The invitee may need to join this
  // server first (§3.12); their client handles that automatically.
  string hosting_server_url = 2;
  // Display-only: DID of the inviter.
  string inviter_did = 3;
  // Unix millis when the invite was issued.
  int64 invited_at_ms = 4;
  // Optional invite-link password the invitee can use if they prefer the
  // `join_via_link` path over `promote_pending_members` (e.g. when their
  // pending row has expired). Empty bytes = "no password supplied".
  bytes invite_link_password = 5;
  reserved 6 to 10;
}

// Sender Keys distribution (docs/03-groups.md §6, libsignal's
// SenderKeyDistributionMessage). Carried over the existing pairwise
// DM transport. Recipients call `crypto::sender_keys::process_skdm` to
// install the sender's key for `(group_id, distribution_id)`; future
// `GroupMessage`s from that sender become decryptable.
message SenderKeyDistribution {
  // 32-byte server-visible group id; lets the recipient route to the
  // correct group's local state.
  bytes group_id        = 1;
  // 16-byte UUID derived deterministically from the group master key
  // (see app-core's `groups::distribution_id_for`). All members of a
  // group compute the same value; the per-sender ratchet state is keyed
  // on `(sender_address, distribution_id)`.
  bytes distribution_id = 2;
  // Serialized `SenderKeyDistributionMessage` bytes.
  bytes skdm            = 3;
  reserved 4 to 10;
}

// A group message encrypted under the sender's Sender Key. Carried over
// the pairwise DM transport for Stage 5 (no sealed-sender envelope yet —
// see §3.11 for the eventual sender-opacity wrapping).
message GroupMessage {
  bytes group_id        = 1;
  bytes distribution_id = 2;
  // Serialized `SenderKeyMessage` bytes; decode with
  // `crypto::sender_keys::group_decrypt`.
  bytes ciphertext      = 3;
  reserved 4 to 10;
}

message ReceiptMessage {
  enum Type {
    DELIVERY = 0;
    READ     = 1;
    // Future: VIEWED (disappearing-media), PLAYED (voice notes), etc.
    reserved 2 to 5;
  }
  Type             type       = 1;
  repeated uint64  timestamps = 2;
  reserved 3 to 10;
}

// Multi-device "Sent transcript" (docs/04-multi-device.md §5.4). When you send
// content to a third party, a copy of the verbatim payload is mirrored to your
// *own* other devices wrapped in a SyncSent, so all your devices share one view
// of the conversation. The receiving device applies it exactly as it would the
// original send, but attributed as outgoing (authored by you) in the named
// conversation. Honored only when the authenticated sender is one of your own
// devices (sender DID == your DID).
//
// `content` is an *encoded* `ContentMessage` (the same bytes sent to the
// recipient) carried as opaque bytes rather than a nested message — this keeps
// the wire type non-recursive and lets new inner content types (reactions,
// edits, future bodies) sync with zero new plumbing.
message SyncSent {
  // Send-time of the wrapped content (its ContentMessage.timestamp_ms); all your
  // devices agree on ordering/identity from this.
  uint64 timestamp = 1;
  // Which conversation the content was sent to (for attribution on the
  // receiving device).
  oneof target {
    string recipient_did = 2;   // a DM
    bytes  group_id      = 3;   // a group (server-visible group id bytes)
  }
  // Encoded `ContentMessage` — the verbatim payload sent to recipients.
  bytes content = 4;
  reserved 5 to 10;
}

// Multi-device read-state sync (docs/04-multi-device.md §5.4). Clears unread
// state on your *other* devices up to a per-conversation timestamp. Event-shaped
// (never reaches a third party). Honored only when the authenticated sender is
// one of your own devices.
message SyncRead {
  repeated ReadMark marks = 1;
  reserved 2 to 10;
}

message ReadMark {
  oneof conversation {
    string peer_did = 1;   // a DM peer
    bytes  group_id = 2;   // a group (server-visible group id bytes)
  }
  // Everything in the conversation sent at/below this timestamp is read.
  uint64 up_to_timestamp = 3;
  reserved 4 to 10;
}
