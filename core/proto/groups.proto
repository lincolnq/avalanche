syntax = "proto3";
package actnet.groups;

// Encrypted group state (§3.1). This message is the plaintext that lives
// inside the server's `encrypted_state` blob; the server never sees this
// shape. Clients re-derive it from the previous state + applied actions on
// every revision, then encrypt under the group master key (§3.3 step 6).

message GroupState {
  // Server-visible routing identifier; redundantly carried so a recipient
  // that decrypts an opaque blob can sanity-check it belongs to the group
  // they thought it did.
  bytes group_id = 1;
  // Unix millis when the group was created.
  int64 created_at_ms = 2;
  // DID of the founder. Carried for display; the server never sees it.
  string creator_did = 3;
  // Monotonically increasing revision. Equals the server's
  // `current_revision`.
  uint64 revision = 4;
  // DID of the member whose change produced *this* state (docs/03 §3.6). Set
  // by the submitting client when it builds the new state, so other clients can
  // attribute the change ("Alice added Bob") when rendering the timeline.
  // Carried inside the encrypted blob — the server stores the blob opaquely and
  // never re-serializes it, so attribution survives any server version (unlike
  // a field in the server-parsed actions). Empty for the founder's revision 0.
  string last_change_actor_did = 5;

  // Group metadata.
  string title = 10;
  string description = 11;
  // Disappearing-message timer, seconds. 0 = disabled.
  uint32 expiry_seconds = 12;
  // Group avatar reference (docs/55). Absent = no avatar. The image bytes live
  // out-of-band as an encrypted blob at an opaque object id derived from the
  // master key; only version/digest/size ride here. Members re-derive the object
  // id + decryption key from the master key they already hold. Bump `version` to
  // trigger a refetch and bust caches.
  GroupAvatar avatar = 13;
  reserved 14 to 19;

  // Membership snapshot. The server stores its own routing subset in
  // `member_credentials` / `members_pending` / `members_pending_approval`;
  // this list is the client-authoritative copy, including the cleartext
  // DID + display info that the server doesn't get to see.
  repeated Member members = 20;
  repeated PendingInvite pending_invites = 21;
  repeated PendingApproval pending_approvals = 22;

  // Policy mirror. The server has its own copy too (§3.1) — clients trust
  // this one for display/local checks; the server's copy is what gates
  // actions on submit.
  Policy policy = 30;

  reserved 31 to 63;
}

message Member {
  string did = 1;
  // 64-byte zkgroup ciphertext (§2.3). Redundant given `did` + master key,
  // but cheap to store and lets clients skip a re-encrypt when emitting
  // actions.
  bytes encrypted_member_id = 2;
  Role role = 3;
  int64 joined_at_ms = 4;
  // 32-byte AES profile key for this member, carried in the encrypted
  // state so newcomers can immediately decrypt every member's profile blob.
  bytes profile_key = 5;
}

message PendingInvite {
  bytes encrypted_member_id = 1;
  Role role = 2;
  string inviter_did = 3;
  int64 invited_at_ms = 4;
  // DID of the invitee, when the inviter knows it (the app-core invite flow
  // always invites by DID). Cleartext inside the encrypted blob like
  // `creator_did`/member DIDs, so any member can render "Alice invited Bob"
  // and the invitee appears named in the pending list. Empty for a future
  // directory flow where the inviter only holds the encrypted_member_id.
  string invited_did = 5;
}

message PendingApproval {
  bytes encrypted_member_id = 1;
  int64 requested_at_ms = 2;
}

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_MEMBER = 1;
  ROLE_ADMIN = 2;
}

enum JoinPolicy {
  JOIN_POLICY_UNSPECIFIED = 0;
  JOIN_POLICY_CLOSED = 1;
  JOIN_POLICY_REQUEST_TO_JOIN = 2;
  JOIN_POLICY_OPEN_LINK = 3;
}

message Policy {
  // Per-action role minimums. modify_member_role and modify_policy are
  // protocol-fixed Admin and not represented here (§3.3).
  Role invite_members_role = 1;
  Role remove_members_role = 2;
  Role modify_title_role = 3;
  Role modify_description_role = 4;
  Role modify_expiry_role = 5;
  // Note: avatar changes are gated by `modify_title_role` (title + avatar are one
  // "group identity" permission, docs/55) — no separate avatar role, to avoid a
  // policy-schema migration.
  reserved 6;

  JoinPolicy join_policy = 10;
  // Empty bytes = no link password set.
  bytes invite_link_password = 11;
  bool announcement_only = 12;
}

// Sub-encrypted action payloads (§3.3). The server holds the ciphertext
// inside the actions blob but never the plaintext. Carried in
// `GroupChange.actions.modify_*` fields.

message ModifyTitle {
  string new_title = 1;
}

message ModifyDescription {
  string new_description = 1;
}

message ModifyExpiry {
  uint32 new_expiry_seconds = 1;
}

// Group avatar reference carried in GroupState (docs/55). The encrypted image
// blob lives out-of-band at an opaque object id derived from the group master
// key (SHA-256 of a domain tag + master key), so it is not carried here;
// members re-derive the object id + a domain-separated decryption key from the
// master key they already hold.
message GroupAvatar {
  uint32 version    = 1;  // monotonic; bump on change to bust caches / trigger refetch
  bytes  digest     = 2;  // SHA-256 of the ciphertext, verified before decrypt
  uint32 size_bytes = 3;  // ciphertext length
}

// Sub-encrypted `modify_avatar` action payload (docs/55). An empty `avatar`
// (version 0) means the avatar was removed.
message ModifyAvatar {
  GroupAvatar avatar = 1;
}
