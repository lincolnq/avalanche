#cloud-config
#
# ============================================================================
#  Avalanche homeserver -- one-shot DigitalOcean bootstrap
# ============================================================================
#  Generated by the Avalanche setup page. Edit web/assets/configure/cloudinit-template.yaml, not here.
#
#  Installs the homeserver (and any bots you selected) from one Avalanche
#  release -- server and bots share the tag:
#    https://github.com/lincolnq/avalanche/releases/tag/__RELEASE_TAG__

write_files:
  - path: /etc/avalanche/bootstrap.env
    permissions: '0600'
    content: |
      # The Avalanche release this droplet installs (server + bots, one tag).
      RELEASE_TAG="__RELEASE_TAG__"

      SERVER_URL="__SERVER_URL__"
      SERVER_NAME="__SERVER_NAME__"
      RELAY_URL="__RELAY_URL__"
      REGISTRATION_SHARED_SECRET="__REGISTRATION_SHARED_SECRET__"

  - path: /etc/postgresql/16/main/conf.d/avalanche.conf
    permissions: '0644'
    content: |
      shared_buffers = 128MB
      effective_cache_size = 512MB
      work_mem = 4MB
      maintenance_work_mem = 32MB
      max_connections = 20
      wal_compression = on
      listen_addresses = ''

  - path: /etc/systemd/system/avalanche.service
    permissions: '0644'
    content: |
      [Unit]
      Description=Avalanche homeserver
      After=network-online.target postgresql.service
      Wants=network-online.target
      Requires=postgresql.service

      [Service]
      Type=simple
      User=avalanche
      Group=avalanche
      EnvironmentFile=/etc/avalanche/avalanche.env
      ExecStart=/usr/local/lib/avalanche/avalanche-server
      WorkingDirectory=/var/lib/avalanche
      Restart=always
      RestartSec=5
      NoNewPrivileges=true
      ProtectSystem=strict
      ProtectHome=true
      PrivateTmp=true
      ReadWritePaths=/var/lib/avalanche

      [Install]
      WantedBy=multi-user.target

  #REGION:ADMINBOT:BEGIN
  - path: /etc/systemd/system/avalanche-adminbot.service
    permissions: '0644'
    content: |
      [Unit]
      Description=Avalanche adminbot
      After=network-online.target avalanche.service
      Wants=network-online.target
      Requires=avalanche.service

      [Service]
      Type=simple
      User=avalanche
      Group=avalanche
      EnvironmentFile=/etc/avalanche/adminbot.env
      ExecStart=/usr/bin/node /usr/local/lib/avalanche-adminbot/node_modules/.bin/adminbot
      WorkingDirectory=/var/lib/avalanche
      Restart=always
      RestartSec=5
      NoNewPrivileges=true
      ProtectSystem=strict
      ProtectHome=true
      PrivateTmp=true
      ReadWritePaths=/var/lib/avalanche

      [Install]
      WantedBy=multi-user.target
  #REGION:ADMINBOT:END

  #REGION:TESTBOT:BEGIN
  - path: /etc/systemd/system/avalanche-testbot.service
    permissions: '0644'
    content: |
      [Unit]
      Description=Avalanche testbot
      After=network-online.target avalanche.service
      Wants=network-online.target
      Requires=avalanche.service

      [Service]
      Type=simple
      User=avalanche
      Group=avalanche
      EnvironmentFile=/etc/avalanche/testbot.env
      ExecStart=/usr/bin/node /usr/local/lib/avalanche-testbot/node_modules/.bin/testbot
      WorkingDirectory=/var/lib/avalanche
      Restart=always
      RestartSec=5
      NoNewPrivileges=true
      ProtectSystem=strict
      ProtectHome=true
      PrivateTmp=true
      ReadWritePaths=/var/lib/avalanche

      [Install]
      WantedBy=multi-user.target
  #REGION:TESTBOT:END

  - path: /usr/local/sbin/avalanche-backup
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      mkdir -p /var/backups/avalanche
      ts="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
      sudo -u postgres pg_dump --clean --if-exists avalanche \
          | gzip > "/var/backups/avalanche/$ts.sql.gz"
      ls -1t /var/backups/avalanche/*.sql.gz | tail -n +8 | xargs -r rm --

  - path: /etc/cron.d/avalanche-backup
    permissions: '0644'
    content: |
      17 3 * * * root /usr/local/sbin/avalanche-backup

  - path: /usr/local/sbin/avalanche-update
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      if [ $# -lt 1 ]; then
          echo "usage: avalanche-update <binary-url>" >&2
          exit 2
      fi
      URL="$1"
      BIN=/usr/local/lib/avalanche/avalanche-server
      NEW="$BIN.new"
      OLD="$BIN.old"
      curl -fsSL -o "$NEW" "$URL"
      chmod +x "$NEW"
      ts="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
      mkdir -p /var/backups/avalanche
      sudo -u postgres pg_dump --clean --if-exists avalanche \
          | gzip > "/var/backups/avalanche/pre-migrate-$ts.sql.gz"
      systemctl stop avalanche
      # `sudo -u` does not load EnvironmentFile, so pull DATABASE_URL out of
      # the same env file systemd uses.
      set -a; . /etc/avalanche/avalanche.env; set +a
      if ! sudo -u avalanche env DATABASE_URL="$DATABASE_URL" "$NEW" migrate; then
          rm -f "$NEW"
          systemctl start avalanche
          exit 1
      fi
      mv "$BIN" "$OLD"
      mv "$NEW" "$BIN"
      systemctl start avalanche
      sleep 2
      if ! systemctl is-active --quiet avalanche; then
          mv "$BIN" "$NEW.failed"
          mv "$OLD" "$BIN"
          systemctl start avalanche
          exit 1
      fi
      rm -f "$OLD"

  - path: /usr/local/bin/avalanche-status
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e
      echo "-- service --------------------------------------"
      # Always show the core services; add bot services only if installed, so
      # this script is correct whether or not you selected the bots.
      units="avalanche caddy postgresql"
      for b in avalanche-adminbot avalanche-testbot; do
          if systemctl cat "$b.service" >/dev/null 2>&1; then units="$units $b"; fi
      done
      systemctl is-active $units || true
      echo
      echo "-- public URL -----------------------------------"
      grep '^SERVER_URL=' /etc/avalanche/avalanche.env | cut -d= -f2-
      echo
      echo "-- first invite ---------------------------------"
      if [ -f /var/lib/avalanche/first-invite.txt ]; then
          cat /var/lib/avalanche/first-invite.txt
          echo
          if command -v qrencode >/dev/null; then
              qrencode -t ANSIUTF8 < /var/lib/avalanche/first-invite.txt
          fi
      else
          echo "(not generated yet)"
      fi

  - path: /usr/local/sbin/avalanche-bootstrap
    permissions: '0700'
    content: |
      #!/bin/bash
      set -euxo pipefail
      source /etc/avalanche/bootstrap.env

      HOSTNAME="$(echo "$SERVER_URL" | sed -E 's#^https?://##; s#/.*##')"

      # Release artifacts are per-arch; pick the tarball matching this droplet.
      ARCH="$(uname -m)"
      case "$ARCH" in
          x86_64)  TARGET=x86_64-unknown-linux-gnu ;;
          aarch64) TARGET=aarch64-unknown-linux-gnu ;;
          *) echo "[bootstrap] unsupported arch: $ARCH" >&2; exit 1 ;;
      esac
      RELEASE_BASE_URL="https://github.com/lincolnq/avalanche/releases/download/$RELEASE_TAG"

      if [ ! -f /swapfile ]; then
          fallocate -l 1G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile none swap sw 0 0' >> /etc/fstab
      fi

      cat > /etc/sysctl.d/99-avalanche.conf <<EOF
      vm.overcommit_memory = 2
      vm.overcommit_ratio = 80
      vm.swappiness = 10
      EOF
      sysctl --system

      # Persistent journald so `journalctl -u <svc>` works (and survives reboots)
      # -- some minimal images default to volatile or no storage, which leaves
      # journalctl empty. Done before services start so their logs are captured
      # from the beginning. Size-capped for the small droplet disk.
      mkdir -p /etc/systemd/journald.conf.d
      cat > /etc/systemd/journald.conf.d/persistent.conf <<EOF
      [Journal]
      Storage=persistent
      SystemMaxUse=200M
      EOF
      mkdir -p /var/log/journal
      systemctl restart systemd-journald

      export DEBIAN_FRONTEND=noninteractive
      apt-get update -qq
      apt-get install -y -qq \
          ca-certificates curl gnupg ufw \
          postgresql-16 postgresql-client-16 \
          qrencode

      #REGION:NODE:BEGIN
      # Node.js 26 -- runtime for the bots (adminbot/testbot need >= 26).
      curl -fsSL https://deb.nodesource.com/setup_26.x | bash -
      apt-get install -y -qq nodejs
      #REGION:NODE:END

      curl -fsSL https://dl.cloudsmith.io/public/caddy/stable/gpg.key \
          | gpg --dearmor -o /usr/share/keyrings/caddy-stable.gpg
      echo "deb [signed-by=/usr/share/keyrings/caddy-stable.gpg] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main" \
          > /etc/apt/sources.list.d/caddy-stable.list
      apt-get update -qq
      apt-get install -y -qq caddy

      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp
      ufw allow 80/tcp
      ufw allow 443/tcp
      ufw --force enable

      useradd --system --home /var/lib/avalanche --shell /usr/sbin/nologin avalanche || true
      install -d -o avalanche -g avalanche -m 750 /var/lib/avalanche
      install -d -o root      -g root      -m 755 /usr/local/lib/avalanche

      systemctl restart postgresql
      sudo -u postgres createuser avalanche || true
      sudo -u postgres createdb -O avalanche avalanche || true

      cat > /etc/caddy/Caddyfile <<EOF
      $HOSTNAME {
          reverse_proxy 127.0.0.1:3000
          encode gzip
          log {
              output stdout
              format console
          }
      }
      EOF

      install -d -o root -g avalanche -m 750 /etc/avalanche
      cat > /etc/avalanche/avalanche.env <<EOF
      SERVER_URL=$SERVER_URL
      SERVER_NAME=$SERVER_NAME
      RELAY_URL=$RELAY_URL
      BIND_ADDR=127.0.0.1:3000
      DATABASE_URL=postgresql:///avalanche?host=/var/run/postgresql
      REGISTRATION_SHARED_SECRET=$REGISTRATION_SHARED_SECRET
      EOF
      chown root:avalanche /etc/avalanche/avalanche.env
      chmod 640 /etc/avalanche/avalanche.env

      # Server binary (per-arch tarball -> bare binary).
      curl -fsSL -o /tmp/avalanche-server.tar.gz "$RELEASE_BASE_URL/av-server-$TARGET.tar.gz"
      tar xzf /tmp/avalanche-server.tar.gz -C /tmp
      install -m 755 /tmp/av-server/avalanche-server /usr/local/lib/avalanche/avalanche-server
      rm -rf /tmp/avalanche-server.tar.gz /tmp/av-server

      systemctl daemon-reload
      # The caddy apt package already started caddy with its default config, so
      # `enable --now` would be a no-op and our Caddyfile (and its HTTPS cert)
      # would never load. Restart so it picks up /etc/caddy/Caddyfile.
      systemctl enable caddy
      systemctl restart caddy
      # `sudo -u` does not load EnvironmentFile, so pass DATABASE_URL explicitly.
      sudo -u avalanche env DATABASE_URL='postgresql:///avalanche?host=/var/run/postgresql' \
          /usr/local/lib/avalanche/avalanche-server migrate
      systemctl enable --now avalanche

      #REGION:ADMINBOT:BEGIN
      # adminbot -- co-located here, reusing the avalanche user. Registers at the
      # reserved superuser Project slug with the same shared secret while
      # registration is closed (docs/22, docs/24). Its SQLCipher state key is
      # generated locally and never leaves the box.
      install -d -o root      -g root      -m 755 /usr/local/lib/avalanche-adminbot
      install -d -o avalanche -g avalanche -m 750 /var/lib/avalanche/adminbot-state
      curl -fsSL -o /tmp/avalanche-adminbot.tar.gz "$RELEASE_BASE_URL/av-adminbot-$TARGET.tar.gz"
      tar xzf /tmp/avalanche-adminbot.tar.gz -C /usr/local/lib/avalanche-adminbot --strip-components=1
      rm -f /tmp/avalanche-adminbot.tar.gz
      ADMINBOT_DB_KEY="$(head -c 32 /dev/urandom | od -An -tx1 | tr -d ' \n')"
      cat > /etc/avalanche/adminbot.env <<EOF
      ADMINBOT_SERVER_URL=$SERVER_URL
      REGISTRATION_SHARED_SECRET=$REGISTRATION_SHARED_SECRET
      ADMINBOT_STATE_DIR=/var/lib/avalanche/adminbot-state
      ADMINBOT_DB_KEY=$ADMINBOT_DB_KEY
      ADMINBOT_LOG=info
      EOF
      chown root:avalanche /etc/avalanche/adminbot.env
      chmod 640 /etc/avalanche/adminbot.env
      systemctl enable --now avalanche-adminbot
      #REGION:ADMINBOT:END

      #REGION:TESTBOT:BEGIN
      # testbot -- demo bot: echoes messages, or talks via Claude if you add
      # ANTHROPIC_API_KEY to /etc/avalanche/testbot.env and restart it. Bound to
      # localhost only (no public port; ufw blocks it regardless).
      install -d -o root -g root -m 755 /usr/local/lib/avalanche-testbot
      curl -fsSL -o /tmp/avalanche-testbot.tar.gz "$RELEASE_BASE_URL/av-testbot-$TARGET.tar.gz"
      tar xzf /tmp/avalanche-testbot.tar.gz -C /usr/local/lib/avalanche-testbot --strip-components=1
      rm -f /tmp/avalanche-testbot.tar.gz
      cat > /etc/avalanche/testbot.env <<EOF
      HOMESERVER_URL=$SERVER_URL
      REGISTRATION_SHARED_SECRET=$REGISTRATION_SHARED_SECRET
      TESTBOT_BIND_ADDR=127.0.0.1:3001
      TESTBOT_LOG=info
      EOF
      chown root:avalanche /etc/avalanche/testbot.env
      chmod 640 /etc/avalanche/testbot.env
      systemctl enable --now avalanche-testbot
      #REGION:TESTBOT:END

      # Save the operator's invite for `avalanche-status` to display.
      cat > /var/lib/avalanche/first-invite.txt <<EOF
      __INVITE_URL__
      EOF
      chown avalanche:avalanche /var/lib/avalanche/first-invite.txt

      echo "[bootstrap] done"

runcmd:
  - [ /usr/local/sbin/avalanche-bootstrap ]

final_message: |
  Avalanche homeserver bootstrap finished in $UPTIME seconds.

    SSH in and run:    avalanche-status
    Service logs:      journalctl -u avalanche -f
    Bot logs:          journalctl -u avalanche-adminbot -f   (or -u avalanche-testbot)
    Caddy / TLS logs:  journalctl -u caddy -f
