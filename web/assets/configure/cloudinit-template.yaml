#cloud-config
#
# ============================================================================
#  Avalanche homeserver -- one-shot DigitalOcean bootstrap
# ============================================================================
#  Generated by the Avalanche setup page. Edit web/assets/configure/cloudinit-template.yaml, not here.
#
#  Thin bootstrap: write the operator's inputs, download the Avalanche deploy
#  bundle for the chosen release, and hand off to its install.sh. All the real
#  work lives in the versioned bundle -- see docs/42-server-upgrades.md:
#    https://github.com/lincolnq/avalanche/releases/tag/__RELEASE_TAG__

write_files:
  - path: /etc/avalanche/bootstrap.env
    permissions: '0600'
    content: |
      # Operator inputs consumed by the deploy bundle's install.sh.
      RELEASE_TAG="__RELEASE_TAG__"
      SERVER_URL="__SERVER_URL__"
      SERVER_NAME="__SERVER_NAME__"
      RELAY_URL="__RELAY_URL__"
      REGISTRATION_SHARED_SECRET="__REGISTRATION_SHARED_SECRET__"
      INVITE_URL="__INVITE_URL__"
      INSTALL_SERVER=1
      INSTALL_ADMINBOT=__INSTALL_ADMINBOT__
      INSTALL_TESTBOT=__INSTALL_TESTBOT__

  - path: /usr/local/sbin/avalanche-fetch-bundle
    permissions: '0700'
    content: |
      #!/bin/bash
      set -euxo pipefail
      . /etc/avalanche/bootstrap.env
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -qq
      apt-get install -y -qq ca-certificates curl tar
      case "$(uname -m)" in
          x86_64|aarch64) ;;
          *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
      esac
      D="/opt/avalanche/deployments/$RELEASE_TAG/deploy"
      mkdir -p "$D"
      curl -fsSL "https://github.com/lincolnq/avalanche/releases/download/$RELEASE_TAG/av-deploy-$RELEASE_TAG.tar.gz" \
          -o /tmp/av-deploy.tar.gz
      tar xzf /tmp/av-deploy.tar.gz -C "$D" --strip-components=1
      rm -f /tmp/av-deploy.tar.gz
      exec "$D/install.sh"

runcmd:
  - [ /usr/local/sbin/avalanche-fetch-bundle ]

final_message: |
  Avalanche bootstrap finished in $UPTIME seconds.

    SSH in and run:    avalanche-status
    Service logs:      journalctl -u avalanche -f
    Bot logs:          journalctl -u avalanche-adminbot -f   (or -u avalanche-testbot)
    Caddy / TLS logs:  journalctl -u caddy -f
