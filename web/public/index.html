<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>avalanche</title>
  <meta name="description" content="Encrypted organizing for collective action.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #FFF1E9;
      color: #6B3E50;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 560px;
      text-align: center;
    }

    .wordmark {
      width: 100%;
      max-width: 420px;
      margin-bottom: 2.5rem;
    }

    .tagline {
      font-size: 1.25rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      font-weight: 400;
    }

    .description {
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 2.5rem;
      opacity: 0.8;
    }

    a.github {
      display: inline-block;
      background: #6B3E50;
      color: #FFF1E9;
      text-decoration: none;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    a.github:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/wordmark.svg" alt="avalanche" class="wordmark">
    <p class="tagline">The online &amp; offline social network. We help people organize.</p>
    <p class="description">
      We're standing on the shoulders of Signal to build the best organizing platform for conferences, rallies and actions. Reach out on Github to learn more.
    </p>
    <a class="github" href="https://github.com/lincolnq/actnet">GitHub</a>
  </div>
</body>
</html>
