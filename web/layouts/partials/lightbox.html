<div id="lightbox" class="lightbox" hidden>
  <img class="lightbox-img" src="" alt="">
</div>
<script>
(function () {
  var box = document.getElementById('lightbox');
  if (!box) return;
  var img = box.querySelector('.lightbox-img');
  var group = [];   // anchors in the currently-open gallery
  var index = 0;

  function show(i) {
    if (!group.length) return;
    index = (i + group.length) % group.length;   // wrap around
    var a = group[index];
    var inner = a.querySelector('img');
    img.src = a.getAttribute('href');
    img.alt = inner ? inner.alt : '';
  }
  function open(a) {
    var gallery = a.closest('.gallery');
    group = gallery
      ? Array.prototype.slice.call(gallery.querySelectorAll('a[data-lightbox]'))
      : [a];
    show(group.indexOf(a));
    box.hidden = false;
    document.body.style.overflow = 'hidden';
  }
  function close() {
    box.hidden = true;
    img.removeAttribute('src');
    document.body.style.overflow = '';
    group = [];
  }

  document.querySelectorAll('a[data-lightbox]').forEach(function (a) {
    a.addEventListener('click', function (e) {
      e.preventDefault();
      open(a);
    });
  });
  box.addEventListener('click', close);
  document.addEventListener('keydown', function (e) {
    if (box.hidden) return;
    if (e.key === 'Escape') close();
    else if (e.key === 'ArrowRight') { e.preventDefault(); show(index + 1); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); show(index - 1); }
  });
})();
</script>
