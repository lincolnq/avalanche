#cloud-config
#
# ════════════════════════════════════════════════════════════════════════════
#  Avalanche homeserver — one-shot DigitalOcean bootstrap (REFERENCE COPY)
# ════════════════════════════════════════════════════════════════════════════
#
#  Operators should NOT paste this file directly. Open
#  `configure.html` (sibling file) in a browser — it has the same logic plus
#  a form for SERVER_URL/SERVER_NAME and a first-invite QR. This YAML is the
#  reference / dev artifact; the HTML is the canonical deploy path and is
#  what stays in sync with the current release version.
#
#  WHAT TO DO IF YOU MUST USE THIS FILE DIRECTLY:
#    1. Edit the lines below marked  >>> EDIT <<<.
#    2. Create a DigitalOcean droplet:
#         - Region: any
#         - Image:  Ubuntu 24.04 LTS x64
#         - Size:   Basic / Regular SSD / $6 (1 GB RAM, 1 vCPU, 25 GB)
#         - Auth:   SSH key (not password)
#         - Advanced → "Add Initial Scripts (user data)": paste this file.
#    3. Point your domain's DNS A-record at the droplet's public IP.
#    4. Wait ~3 minutes. SSH in (`ssh root@<ip>`) and run `avalanche-status`
#       to see the QR code for your first invite.
#
#  TIME: ~3 minutes from droplet creation to working homeserver.
#
#  WHAT THIS SETS UP:
#    - Ubuntu hardening: firewall (22/80/443 only), swap, kernel tuning.
#    - PostgreSQL 16, tuned for a 1 GB box, listening on a Unix socket.
#    - The Avalanche server binary, running as a systemd service.
#    - Caddy, fronting the server with auto-renewing Let's Encrypt TLS.
#    - Nightly `pg_dump` to /var/backups/avalanche (last 7 kept).
#    - The first invite link, printed to the console + saved to a QR file.
#
# ════════════════════════════════════════════════════════════════════════════

write_files:
  # ──────────────────────────────────────────────────────────────────────
  #  >>> EDIT <<<  Operator-supplied values.
  # ──────────────────────────────────────────────────────────────────────
  - path: /etc/avalanche/bootstrap.env
    permissions: '0600'
    content: |
      SERVER_URL="https://av.example.org"
      SERVER_NAME="Your Org's Homeserver"
      RELAY_URL="https://relay.avalanche.example"
      # Bootstrap registration secret (configure.html generates a random one).
      # Registration is closed by default; this secret admits accounts until a
      # gatekeeper Project is installed, after which it auto-disables.
      REGISTRATION_SHARED_SECRET="CHANGEME-random-secret"

  # ──────────────────────────────────────────────────────────────────────
  #  PostgreSQL tuning for a 1 GB droplet.
  # ──────────────────────────────────────────────────────────────────────
  - path: /etc/postgresql/16/main/conf.d/avalanche.conf
    permissions: '0644'
    content: |
      shared_buffers = 128MB
      effective_cache_size = 512MB
      work_mem = 4MB
      maintenance_work_mem = 32MB
      max_connections = 20
      wal_compression = on
      # Postgres listens only on the Unix socket — nothing on TCP.
      listen_addresses = ''

  # ──────────────────────────────────────────────────────────────────────
  #  systemd unit for the homeserver binary.
  # ──────────────────────────────────────────────────────────────────────
  - path: /etc/systemd/system/avalanche.service
    permissions: '0644'
    content: |
      [Unit]
      Description=Avalanche homeserver
      After=network-online.target postgresql.service
      Wants=network-online.target
      Requires=postgresql.service

      [Service]
      Type=simple
      User=avalanche
      Group=avalanche
      EnvironmentFile=/etc/avalanche/avalanche.env
      ExecStart=/usr/local/lib/avalanche/avalanche-server
      WorkingDirectory=/var/lib/avalanche
      Restart=always
      RestartSec=5

      # Hardening
      NoNewPrivileges=true
      ProtectSystem=strict
      ProtectHome=true
      PrivateTmp=true
      ReadWritePaths=/var/lib/avalanche

      [Install]
      WantedBy=multi-user.target

  # ──────────────────────────────────────────────────────────────────────
  #  Nightly backup script + cron.
  # ──────────────────────────────────────────────────────────────────────
  - path: /usr/local/sbin/avalanche-backup
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      mkdir -p /var/backups/avalanche
      ts="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
      sudo -u postgres pg_dump --clean --if-exists avalanche \
          | gzip > "/var/backups/avalanche/$ts.sql.gz"
      # Keep the 7 newest backups.
      ls -1t /var/backups/avalanche/*.sql.gz | tail -n +8 | xargs -r rm --

  - path: /etc/cron.d/avalanche-backup
    permissions: '0644'
    content: |
      # Nightly pg_dump at 03:17 UTC.
      17 3 * * * root /usr/local/sbin/avalanche-backup

  # ──────────────────────────────────────────────────────────────────────
  #  `avalanche-update` — install a new release. Stops the service, snapshots
  #  the DB, runs migrations against the NEW binary, swaps the binary in
  #  atomically, restarts. On any failure, leaves the old binary in place
  #  and restarts it so the homeserver stays up.
  # ──────────────────────────────────────────────────────────────────────
  - path: /usr/local/sbin/avalanche-update
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail

      if [ $# -lt 1 ]; then
          echo "usage: avalanche-update <binary-url>" >&2
          exit 2
      fi
      URL="$1"
      BIN=/usr/local/lib/avalanche/avalanche-server
      NEW="$BIN.new"
      OLD="$BIN.old"

      echo "[update] downloading $URL"
      curl -fsSL -o "$NEW" "$URL"
      chmod +x "$NEW"
      "$NEW" --version || { echo "[update] new binary is not executable"; rm -f "$NEW"; exit 1; }

      ts="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
      echo "[update] snapshotting database (pre-migrate-$ts)"
      mkdir -p /var/backups/avalanche
      sudo -u postgres pg_dump --clean --if-exists avalanche \
          | gzip > "/var/backups/avalanche/pre-migrate-$ts.sql.gz"

      echo "[update] stopping avalanche"
      systemctl stop avalanche

      echo "[update] running migrations against new binary"
      # `sudo -u` does not load EnvironmentFile, so pull DATABASE_URL out of
      # the same env file systemd uses.
      set -a; . /etc/avalanche/avalanche.env; set +a
      if ! sudo -u avalanche env DATABASE_URL="$DATABASE_URL" "$NEW" migrate; then
          echo "[update] migrate FAILED — restoring old binary and restarting"
          rm -f "$NEW"
          systemctl start avalanche
          exit 1
      fi

      echo "[update] swapping binary in"
      mv "$BIN" "$OLD"
      mv "$NEW" "$BIN"

      echo "[update] starting avalanche"
      systemctl start avalanche
      sleep 2
      if ! systemctl is-active --quiet avalanche; then
          echo "[update] new binary failed to start — rolling back"
          mv "$BIN" "$NEW.failed"
          mv "$OLD" "$BIN"
          systemctl start avalanche
          exit 1
      fi
      rm -f "$OLD"
      echo "[update] done — new version live"

  # ──────────────────────────────────────────────────────────────────────
  #  Operator convenience: `avalanche-status` prints health + invite QR.
  # ──────────────────────────────────────────────────────────────────────
  - path: /usr/local/bin/avalanche-status
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e
      echo "── service ──────────────────────────────────────"
      systemctl is-active avalanche caddy postgresql || true
      echo
      echo "── public URL ───────────────────────────────────"
      grep '^SERVER_URL=' /etc/avalanche/avalanche.env | cut -d= -f2-
      echo
      echo "── first invite ─────────────────────────────────"
      if [ -f /var/lib/avalanche/first-invite.txt ]; then
          cat /var/lib/avalanche/first-invite.txt
          echo
          if command -v qrencode >/dev/null; then
              qrencode -t ANSIUTF8 < /var/lib/avalanche/first-invite.txt
          fi
      else
          echo "(not generated yet — run: avalanche-invite-first)"
      fi

  # ──────────────────────────────────────────────────────────────────────
  #  Main bootstrap script. Runs once at first boot via `runcmd`.
  # ──────────────────────────────────────────────────────────────────────
  - path: /usr/local/sbin/avalanche-bootstrap
    permissions: '0700'
    content: |
      #!/bin/bash
      set -euxo pipefail
      source /etc/avalanche/bootstrap.env

      # ─── Extract bare hostname from SERVER_URL for Caddy. ──────────────
      HOSTNAME="$(echo "$SERVER_URL" | sed -E 's#^https?://##; s#/.*##')"

      # ─── Swap (DO 1GB droplets ship with none). ────────────────────────
      if [ ! -f /swapfile ]; then
          fallocate -l 1G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile none swap sw 0 0' >> /etc/fstab
      fi

      # ─── Kernel tuning for low-memory PG. ──────────────────────────────
      cat > /etc/sysctl.d/99-avalanche.conf <<EOF
      vm.overcommit_memory = 2
      vm.overcommit_ratio = 80
      vm.swappiness = 10
      EOF
      sysctl --system

      # ─── Packages. ─────────────────────────────────────────────────────
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -qq
      apt-get install -y -qq \
          ca-certificates curl gnupg ufw \
          postgresql-16 postgresql-client-16 \
          qrencode

      # Caddy from its official apt repo.
      curl -fsSL https://dl.cloudsmith.io/public/caddy/stable/gpg.key \
          | gpg --dearmor -o /usr/share/keyrings/caddy-stable.gpg
      echo "deb [signed-by=/usr/share/keyrings/caddy-stable.gpg] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main" \
          > /etc/apt/sources.list.d/caddy-stable.list
      apt-get update -qq
      apt-get install -y -qq caddy

      # ─── Firewall. ─────────────────────────────────────────────────────
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp
      ufw allow 80/tcp
      ufw allow 443/tcp
      ufw --force enable

      # ─── avalanche user + dirs. ───────────────────────────────────────────
      useradd --system --home /var/lib/avalanche --shell /usr/sbin/nologin avalanche || true
      install -d -o avalanche -g avalanche -m 750 /var/lib/avalanche
      install -d -o root   -g root   -m 755 /usr/local/lib/avalanche

      # ─── PostgreSQL: socket-only, dedicated role + database. ───────────
      systemctl restart postgresql
      # The `avalanche` OS user authenticates via peer auth on the Unix socket.
      sudo -u postgres createuser avalanche || true
      sudo -u postgres createdb -O avalanche avalanche || true

      # ─── Caddyfile (auto-TLS for the operator's domain). ───────────────
      cat > /etc/caddy/Caddyfile <<EOF
      $HOSTNAME {
          reverse_proxy 127.0.0.1:3000
          encode gzip
          log {
              output stdout
              format console
          }
      }
      EOF

      # ─── avalanche env (DATABASE_URL uses the Unix socket, no password). ──
      install -d -o root -g avalanche -m 750 /etc/avalanche
      cat > /etc/avalanche/avalanche.env <<EOF
      SERVER_URL=$SERVER_URL
      SERVER_NAME=$SERVER_NAME
      RELAY_URL=$RELAY_URL
      BIND_ADDR=127.0.0.1:3000
      DATABASE_URL=postgresql:///avalanche?host=/var/run/postgresql
      REGISTRATION_SHARED_SECRET=$REGISTRATION_SHARED_SECRET
      EOF
      chown root:avalanche /etc/avalanche/avalanche.env
      chmod 640 /etc/avalanche/avalanche.env

      # ─── Server binary. ────────────────────────────────────────────────
      # The binary exposes a `migrate` subcommand (sqlx::migrate!() embedded)
      # that is NEVER run by the systemd service — it must be invoked
      # explicitly here on first boot, and by /usr/local/sbin/avalanche-update
      # on every release upgrade. See docs/40-deployment.md § Updates.
      curl -fsSL -o /usr/local/lib/avalanche/avalanche-server \
          https://github.com/lincolnq/actnet/releases/download/0.1.0/avalanche-server
      chmod +x /usr/local/lib/avalanche/avalanche-server

      # ─── First-deploy migrations. ──────────────────────────────────────
      # Schema is applied once here, before the service ever starts.
      # Subsequent schema changes go through `avalanche-update`, which also
      # runs `migrate` after downloading a new binary but before restart.
      systemctl daemon-reload
      systemctl enable --now caddy
      # `sudo -u` does not load EnvironmentFile, so pass DATABASE_URL explicitly.
      sudo -u avalanche env DATABASE_URL='postgresql:///avalanche?host=/var/run/postgresql' \
          /usr/local/lib/avalanche/avalanche-server migrate
      systemctl enable --now avalanche

      # ─── First invite (best-effort; binary may not exist yet). ─────────
      # TODO(deploy): when the avalanche-invite CLI ships, generate a one-shot
      # admin invite here and save it to /var/lib/avalanche/first-invite.txt.
      # Until then, leave a placeholder so `avalanche-status` is informative.
      echo "(first-invite generation pending CLI — see docs/40-deployment.md)" \
          > /var/lib/avalanche/first-invite.txt
      chown avalanche:avalanche /var/lib/avalanche/first-invite.txt

      echo "[bootstrap] done"

runcmd:
  - [ /usr/local/sbin/avalanche-bootstrap ]

final_message: |
  Avalanche homeserver bootstrap finished in $UPTIME seconds.

    SSH in and run:    avalanche-status
    Service logs:      journalctl -u avalanche -f
    Caddy / TLS logs:  journalctl -u caddy -f
