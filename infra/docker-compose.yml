services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: actnet
      POSTGRES_USER: actnet
      POSTGRES_PASSWORD: actnet-dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Migrations are embedded in the server binary and applied via
    # `avalanche-server migrate` (see `make migrate`) — not mounted as initdb
    # scripts. This keeps dev exercising the same code path as prod.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actnet"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
