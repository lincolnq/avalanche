name: Actnet
options:
  bundleIdPrefix: net.theavalanche
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.3"

targets:
  Actnet:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: ../Generated/app_core.swift
        group: Generated
    dependencies:
      # AppCoreFFI.xcframework wraps static .a archives (libapp_core.a). They
      # link into the main executable directly — embedding would copy a raw
      # static library into Actnet.app/Frameworks/, which App Store Connect
      # rejects (error 90171/90432).
      - framework: ../AppCoreFFI.xcframework
        embed: false
    entitlements:
      path: Actnet.entitlements
      properties:
        com.apple.developer.associated-domains:
          - webcredentials:theavalanche.net
          - applinks:go.theavalanche.net
        # Substituted from the per-config APS_ENVIRONMENT build setting
        # below. Debug → development (sandbox APNs, paired with Xcode runs);
        # Release → production (used by TestFlight and App Store builds).
        aps-environment: $(APS_ENVIRONMENT)
    settings:
      base:
        DEVELOPMENT_TEAM: 7FVK3RR3TV
        PRODUCT_BUNDLE_IDENTIFIER: net.theavalanche.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 2
        SWIFT_VERSION: "6.0"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleName: Avalanche
        INFOPLIST_KEY_CFBundleDisplayName: Avalanche
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Avalanche needs camera access to scan invite QR codes."
        # iPhone: portrait-only (Signal pattern). iPad: all four so the
        # iPad-multitasking validator (error 90474) is satisfied.
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # Substituted from .env at xcodegen time. Carried as a build setting
        # so $(RELAY_URL) inside Info.{Debug,Release}.plist resolves at
        # Xcode build time. Read at runtime by PushManager (empty → push
        # disabled).
        RELAY_URL: ${RELAY_URL}
      configs:
        Debug:
          APS_ENVIRONMENT: development
          # Debug uses an ATS exception for ts.net so a Tailscale-hosted
          # dev homeserver is reachable over plain HTTP.
          INFOPLIST_FILE: Info.Debug.plist
        Release:
          APS_ENVIRONMENT: production
          # Release has no ATS exceptions — only HTTPS endpoints.
          INFOPLIST_FILE: Info.Release.plist
          SWIFT_OPTIMIZATION_LEVEL: "-O"
