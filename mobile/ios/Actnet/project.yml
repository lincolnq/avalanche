name: Actnet
options:
  bundleIdPrefix: net.theavalanche
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.3"

# Explicit shared scheme for the app so Xcode defaults to it (rather than the
# non-runnable ShareExtension) after a project regeneration.
schemes:
  Actnet:
    build:
      targets:
        Actnet: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Actnet:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: ../Generated/app_core.swift
        group: Generated
      # Shared with the ShareExtension target — App Group handoff helper (docs/35).
      - path: ../Shared
        group: Shared
    dependencies:
      # AppCoreFFI.xcframework wraps static .a archives (libapp_core.a). They
      # link into the main executable directly — embedding would copy a raw
      # static library into Actnet.app/Frameworks/, which App Store Connect
      # rejects (error 90171/90432).
      - framework: ../AppCoreFFI.xcframework
        embed: false
      # Share extension — embedded into the app bundle (docs/35).
      - target: ShareExtension
        embed: true
      # Notification Service Extension — embedded into the app bundle (docs/16).
      - target: NotificationServiceExtension
        embed: true
    entitlements:
      path: Actnet.entitlements
      properties:
        com.apple.developer.associated-domains:
          - webcredentials:theavalanche.net
          - applinks:go.theavalanche.net
        # Substituted from the per-config APS_ENVIRONMENT build setting
        # below. Debug → development (sandbox APNs, paired with Xcode runs);
        # Release → production (used by TestFlight and App Store builds).
        aps-environment: $(APS_ENVIRONMENT)
        # Shared container for the share-extension → app image handoff (docs/35)
        # and the App Group databases the NSE reads (docs/16).
        com.apple.security.application-groups:
          - group.net.theavalanche.app
        # Shared keychain group so the Notification Service Extension can read the
        # SQLCipher passphrase (docs/16 dep 1). $(AppIdentifierPrefix) resolves to
        # the team prefix at build time. Must match `sharedAccessGroup` in
        # SecureEnclaveKeyManager.swift.
        keychain-access-groups:
          - $(AppIdentifierPrefix)net.theavalanche.app.shared
    settings:
      base:
        DEVELOPMENT_TEAM: 7FVK3RR3TV
        PRODUCT_BUNDLE_IDENTIFIER: net.theavalanche.app
        # Substituted at xcodegen time from the environment, which the Makefile
        # derives from git: latest tag (leading `v` stripped) → MARKETING_VERSION,
        # total commit count → CURRENT_PROJECT_VERSION. `make ios`/`make archive`
        # additionally override these on the xcodebuild command line, so an
        # archive is always stamped with the current git-derived version even if
        # the .xcodeproj wasn't regenerated. Build via make, not bare xcodegen.
        MARKETING_VERSION: ${MARKETING_VERSION}
        CURRENT_PROJECT_VERSION: ${CURRENT_PROJECT_VERSION}
        SWIFT_VERSION: "6.0"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        # iPhone-only (device family 1). The UI is a portrait phone layout with no
        # iPad-specific adaptations, so we don't ship an iPad build — this also
        # drops the App Store 13" iPad screenshot requirement and the iPad
        # landscape/Split View review surface.
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleName: Avalanche
        INFOPLIST_KEY_CFBundleDisplayName: Avalanche
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Avalanche needs camera access to scan invite QR codes and take profile photos."
        # Portrait-only (Signal pattern). iPhone-only, so no iPad orientation key
        # (the former iPad-multitasking validator, error 90474, no longer applies).
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        # Declares the app's encryption qualifies for the mass-market
        # exemption (only standard algorithms — Curve25519, AES-GCM, HKDF,
        # SHA-256, ML-KEM, Ed25519). Baking this in avoids the
        # export-compliance questionnaire on every TestFlight upload. The
        # annual BIS self-classification report (5D992.c) is a separate,
        # off-Apple obligation that kicks in at public-App-Store release.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        # Substituted from .env at xcodegen time. Carried as a build setting
        # so $(RELAY_URL) inside Info.{Debug,Release}.plist resolves at
        # Xcode build time. Read at runtime by PushManager (empty → push
        # disabled).
        RELAY_URL: ${RELAY_URL}
      configs:
        Debug:
          APS_ENVIRONMENT: development
          # Debug uses an ATS exception for ts.net so a Tailscale-hosted
          # dev homeserver is reachable over plain HTTP.
          INFOPLIST_FILE: Info.Debug.plist
        Release:
          APS_ENVIRONMENT: production
          # Release has no ATS exceptions — only HTTPS endpoints.
          INFOPLIST_FILE: Info.Release.plist
          SWIFT_OPTIMIZATION_LEVEL: "-O"

  # Share extension (docs/35): receives a shared image from another app, writes
  # it to the App Group container, and opens the main app to pick a chat. Runs no
  # app-core — just the file handoff.
  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ../ShareExtension
        group: ShareExtension
      # The App Group handoff helper, shared with the app target.
      - path: ../Shared
        group: Shared
    entitlements:
      path: ../ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.net.theavalanche.app
    settings:
      base:
        DEVELOPMENT_TEAM: 7FVK3RR3TV
        PRODUCT_BUNDLE_IDENTIFIER: net.theavalanche.app.ShareExtension
        MARKETING_VERSION: ${MARKETING_VERSION}
        CURRENT_PROJECT_VERSION: ${CURRENT_PROJECT_VERSION}
        SWIFT_VERSION: "6.0"
        # Match the host app — iPhone-only.
        TARGETED_DEVICE_FAMILY: "1"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: ../ShareExtension/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Avalanche

  # Notification Service Extension (docs/16): on a content-free alert push, runs
  # app-core to fetch + decrypt on-device and rewrite the banner with the real
  # sender/message. Links the same static app-core the app does, and shares the
  # App Group container (databases) + shared keychain group (DB passphrase) so it
  # can open the accounts' stores.
  NotificationServiceExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ../NotificationServiceExtension
        group: NotificationServiceExtension
      # Generated UniFFI glue, shared with the app target — makes
      # `fetchNotifications` (and the app-core types) callable here.
      - path: ../Generated/app_core.swift
        group: Generated
      # SecureEnclaveKeyManager (DB key), AppGroup (container/suite), and the
      # shared account list — all compiled into the app target too.
      - path: ../Shared
        group: Shared
    dependencies:
      # Same static-lib xcframework the app links; the .a links into the appex
      # executable (embed: false — it's a static archive, not a framework).
      - framework: ../AppCoreFFI.xcframework
        embed: false
    entitlements:
      path: ../NotificationServiceExtension/NotificationServiceExtension.entitlements
      properties:
        # Must match the app so the NSE opens the same databases (docs/16 dep 2).
        com.apple.security.application-groups:
          - group.net.theavalanche.app
        # Must match the app's shared keychain group so the NSE reads the DB
        # passphrase (docs/16 dep 1); same value as SecureEnclaveKeyManager.
        keychain-access-groups:
          - $(AppIdentifierPrefix)net.theavalanche.app.shared
    settings:
      base:
        DEVELOPMENT_TEAM: 7FVK3RR3TV
        PRODUCT_BUNDLE_IDENTIFIER: net.theavalanche.app.nse
        MARKETING_VERSION: ${MARKETING_VERSION}
        CURRENT_PROJECT_VERSION: ${CURRENT_PROJECT_VERSION}
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: ../NotificationServiceExtension/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Avalanche
