name: Actnet
options:
  bundleIdPrefix: net.theavalanche
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.3"

targets:
  Actnet:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: ../Generated/app_core.swift
        group: Generated
    dependencies:
      - framework: ../AppCoreFFI.xcframework
    entitlements:
      path: Actnet.entitlements
      properties:
        com.apple.developer.associated-domains:
          - webcredentials:theavalanche.net
          - applinks:go.theavalanche.net
    settings:
      base:
        DEVELOPMENT_TEAM: 7FVK3RR3TV
        PRODUCT_BUNDLE_IDENTIFIER: net.theavalanche.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleName: Avalanche
        INFOPLIST_KEY_CFBundleDisplayName: Avalanche
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Avalanche needs camera access to scan invite QR codes."
    info:
      path: Info.plist
      properties:
        # ATS exception for Tailscale Magic DNS so we can reach a dev
        # homeserver / project webview at e.g.
        #   http://<host>.tailNNNNN.ts.net:3000
        # The Tailscale tunnel provides WireGuard encryption end-to-end,
        # so the plaintext HTTP between the iOS app and the dev machine
        # never crosses the public internet in cleartext.
        NSAppTransportSecurity:
          NSExceptionDomains:
            ts.net:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
