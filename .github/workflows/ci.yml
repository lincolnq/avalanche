name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - name: cargo check
        run: cd core && cargo check --workspace

      - name: cargo clippy
        run: cd core && cargo clippy --workspace -- -D warnings

  # ── Core tests (no database) ────────────────────────────────────────────────
  test-core:
    name: Core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - name: Run core tests
        run: cd core && cargo test -p crypto -p store -p types

  # ── Server tests (requires PostgreSQL) ──────────────────────────────────────
  test-server:
    name: Server tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: actnet
          POSTGRES_USER: actnet
          POSTGRES_PASSWORD: actnet-dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://actnet:actnet-dev@localhost/actnet
      PGPASSWORD: actnet-dev

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - name: Run server tests
        run: cd core && cargo test -p server

  # ── Desktop (frontend build + Tauri bindings drift) ─────────────────────────
  desktop:
    name: Desktop build & bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libxdo-dev libssl-dev patchelf

      - name: Install npm dependencies
        run: cd desktop && npm ci

      - name: Build frontend (tsc + vite)
        run: cd desktop && npm run build

      - name: Regenerate Tauri bindings
        run: cd desktop/src-tauri && cargo run --features codegen

      - name: Check bindings.ts is in sync
        run: |
          if ! git diff --exit-code desktop/src/bindings.ts; then
            echo "::error::desktop/src/bindings.ts is out of date. Run 'make desktop-bindings' and commit the result."
            exit 1
          fi
