"$schema" = "https://schema.tauri.app/config/2"

# SECURITY: this set exposes the full app-core native surface. It is safe only
# because the `default` capability binds it to `windows = ["main"]` +
# `local = true` (see capabilities/default.json), so ephemeral `project-*`
# webviews showing remote project content do NOT inherit these commands. Do not
# broaden that capability's window scope to a glob, or add a `remote` block,
# without re-reviewing this — that is what would hand the native surface to
# remote content.
[[permission]]
identifier = "allow-all"
description = "Allow all avalanche custom commands"
commands.allow = [
  "ping",
  "create_account",
  "login",
  "recover_from_blob",
  "send_dm",
  "send_group_message",
  "next_events",
  "save_message",
  "load_conversations",
  "load_messages",
  "mark_messages_read",
  "unread_count",
  "did",
  "device_id",
  "own_display_name",
  "set_display_name",
  "has_recovery",
  "update_recovery_blob",
  "home_server",
  "generate_recovery_phrase",
  "recovery_phrase_to_seed",
  "derive_did_from_passkey",
  "contact_display_name",
  "cached_display_names",
  "get_account_info",
  "refresh_contact_profile",
  "list_contacts",
  "touch_contact",
  "fetch_and_cache_profile",
  "prime_contact_profile",
  "block_contact",
  "unblock_contact",
  "leave_server",
  "delete_identity",
  "fetch_projects",
  "request_project_token",
  "validate_invite",
  "connection_state",
  "wait_for_connection_state_change",
  "create_group",
  "fetch_group_state",
  "cached_group_state",
  "invite_member",
  "accept_invite",
  "decline_invite",
  "cancel_join_request",
  "approve_join_request",
