[package]
name = "actnet-desktop"
version = "0.1.0"
description = "Avalanche Desktop"
license = "AGPL-3.0-only"
edition = "2021"
rust-version = "1.77"

[lib]
name = "actnet_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-store = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
